name: Sync Upstream Releases

on:
  schedule:
    # Run daily at 2 AM UTC to check for new releases
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      rebase_branch:
        description: 'Branch to rebase onto upstream releases'
        required: false
        default: 'aj3x'

permissions:
  contents: write
  issues: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/n8n-io/n8n.git || git remote set-url upstream https://github.com/n8n-io/n8n.git
          git fetch upstream --tags

      - name: Create or update release branch
        run: |
          # Fetch the latest upstream release tag (upstream tags are already fetched in the previous step)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^n8n@[0-9]' | head -1)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No upstream tags found"
            exit 0
          fi
          
          echo "Latest upstream tag: $LATEST_TAG"
          
          # Check if origin already has this tag (local tags include upstream's, so check origin directly)
          if git ls-remote --tags origin "refs/tags/$LATEST_TAG" | grep -q "$LATEST_TAG"; then
            echo "Release $LATEST_TAG already synced to origin"
            BRANCH_NEEDS_UPDATE=false
          else
            echo "New release found: $LATEST_TAG"
            BRANCH_NEEDS_UPDATE=true
          fi
          
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "BRANCH_NEEDS_UPDATE=$BRANCH_NEEDS_UPDATE" >> $GITHUB_ENV

      - name: Checkout or create release branch
        if: env.BRANCH_NEEDS_UPDATE == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Create release tracking branch pointing at the tag
          git checkout -B upstream-release "refs/tags/${{ env.LATEST_TAG }}"
          
          # Restore .github/workflows/ from the fork's default branch so the push
          # doesn't include workflow file changes (the default GITHUB_TOKEN cannot
          # push workflow modifications without the `workflows` permission).
          git checkout origin/${{ github.event.inputs.rebase_branch || 'aj3x' }} -- .github/workflows/ 2>/dev/null \
            || git checkout origin/main -- .github/workflows/ 2>/dev/null \
            || true
          git add .github/workflows/
          git diff --cached --quiet .github/workflows/ \
            || git commit --amend --no-edit
          
          # Push the release tracking branch and the tag to origin
          git push origin upstream-release --force
          git push origin "refs/tags/${{ env.LATEST_TAG }}"

      - name: Rebase custom branch
        if: env.BRANCH_NEEDS_UPDATE == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          REBASE_BRANCH="${{ github.event.inputs.rebase_branch || 'aj3x' }}"
          
          # Fetch the custom branch
          git fetch origin "$REBASE_BRANCH"
          git checkout "$REBASE_BRANCH"
          
          # Attempt to rebase on upstream release
          if git rebase upstream-release; then
            echo "Rebase successful"
            echo "REBASE_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "Rebase conflict detected"
            git rebase --abort
            echo "REBASE_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Remove upstream-only workflows
        if: env.REBASE_SUCCESS == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # List of workflows to remove (they are maintained by upstream and not needed in the fork)
          WORKFLOWS_TO_REMOVE=(
            # Release/Publishing
            "release-publish.yml"
            "release-create-pr.yml"
            "release-create-minor-pr.yml"
            "release-create-patch-pr.yml"
            "release-publish-new-package.yml"
            "release-publish-post-release.yml"
            "release-push-to-channel.yml"
            "release-schedule-patch-prs.yml"
            "release-promote-github-release.yml"
            "release-promote-backport-labels.yml"
            "release-create-github-releases.yml"
            "release-set-stable-npm-packages-to-latest.yml"
            "release-standalone-package.yml"
            "release-merge-tag-to-branch.yml"
            "release-populate-cloud-with-releases.yml"
            "release-update-pointer-tag.yml"
            "release-version-release-notification.yml"
            # Security Scanning
            "sec-ci-reusable.yml"
            "sec-poutine-reusable.yml"
            "sec-publish-fix-1x.yml"
            "sec-publish-fix.yml"
            "sec-sync-public-to-private.yml"
            "sec-zizmor-reusable.yml"
            "security-trivy-scan-callable.yml"
            # Backporting & Branch Management
            "backport.yml"
            "util-backport-bundle.yml"
            "clean-stale-branches.yml"
            "util-cleanup-abandoned-release-branches.yml"
            "util-ensure-release-candidate-branches.yml"
            "util-sync-master-to-3x.yml"
            # Community/Team Management
            "community-pr-close-stale.yml"
            "ci-owners-assign-reviewers.yml"
            "ci-owners-review-recommendations.yml"
            "ci-pull-request-review.yml"
            "ci-restrict-private-merges.yml"
            # Utility/Analytics
            "util-cleanup-pr-images.yml"
            "util-data-tooling.yml"
            "util-notify-pr-status.yml"
            "util-claude-task.yml"
            "util-update-node-popularity.yml"
            "util-sync-api-docs.yml"
            "util-qa-metrics-comment-reusable.yml"
            # Nightly builds (optional - uncomment if not needed)
            "build-v3-nightly.yml"
            "mutation-health-nightly.yml"
            "test-benchmark-nightly.yml"
            "test-e2e-coverage-nightly.yml"
            "test-e2e-vm-expressions-nightly.yml"
            "test-workflows-nightly.yml"
          )
          
          # Remove the workflows
          REMOVED_COUNT=0
          for workflow in "${WORKFLOWS_TO_REMOVE[@]}"; do
            if [ -f ".github/workflows/$workflow" ]; then
              rm ".github/workflows/$workflow"
              REMOVED_COUNT=$((REMOVED_COUNT + 1))
            fi
          done
          
          # Stage and commit if any workflows were removed
          if [ $REMOVED_COUNT -gt 0 ]; then
            git add -A .github/workflows/
            git commit -m "chore: remove upstream-only workflows ($REMOVED_COUNT removed)" || true
            echo "WORKFLOWS_REMOVED=$REMOVED_COUNT" >> $GITHUB_ENV
          else
            echo "WORKFLOWS_REMOVED=0" >> $GITHUB_ENV
          fi

      - name: Push custom branch with cleaned workflows
        if: env.REBASE_SUCCESS == 'true'
        run: |
          git push origin "${{ github.event.inputs.rebase_branch || 'aj3x' }}" --force

      - name: Create issue for manual conflict resolution if needed
        if: env.REBASE_SUCCESS == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Rebase conflict: upstream release ${{ env.LATEST_TAG }}`,
              body: `⚠️ **Rebase conflict detected** when syncing upstream release ${{ env.LATEST_TAG }}\n\nThe \`${{ github.event.inputs.rebase_branch || 'aj3x' }}\` branch could not be automatically rebased onto the latest upstream release due to conflicts.\n\n**Manual action required:**\n1. \`git fetch origin\`\n2. \`git checkout ${{ github.event.inputs.rebase_branch || 'aj3x' }}\`\n3. \`git rebase upstream-release\` (resolve conflicts)\n4. \`git push origin ${{ github.event.inputs.rebase_branch || 'aj3x' }} --force\``,
              labels: ['upstream-sync']
            });

      - name: Summary
        run: |
          echo "## Upstream Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Latest upstream tag: ${{ env.LATEST_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rebase branch: ${{ github.event.inputs.rebase_branch || 'aj3x' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rebase status: ${{ env.REBASE_SUCCESS }}" >> $GITHUB_STEP_SUMMARY
          echo "- Workflows removed: ${WORKFLOWS_REMOVED:-0}" >> $GITHUB_STEP_SUMMARY
